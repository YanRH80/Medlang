# =============================================================================
# Editor simple — configuración
# =============================================================================
#
# Cambia el comportamiento del editor sin tocar el código. Edita este archivo,
# guarda y vuelve a abrir la app para que los cambios tengan efecto.
#
# Convenciones:
#   - Los valores entre comillas son texto libre.
#   - true / false (sin comillas) son booleanos.
#   - Cada clave indica los valores aceptados y su valor por defecto.
#
# Hotkeys: cada comando puede tener una lista de `hotkeys`.
#   Formato: "ctrl+<letra>", "super+<letra>", "alt+<letra>", "shift+<letra>".
#   Combinaciones: "ctrl+shift+x", "ctrl+alt+d".
#   macOS: super = Cmd. En Ghostty/Wezterm/Kitty/iTerm2 Cmd funciona.
#   En Terminal.app nativo, usar ctrl+ en su lugar.


# -----------------------------------------------------------------------------
# Aplicación
# -----------------------------------------------------------------------------
app:
  title: "Editor simple"
  subtitle: "Vim-like + JSON"


# -----------------------------------------------------------------------------
# Editor
# -----------------------------------------------------------------------------
editor:
  placeholder: "Modo NORMAL. Pulsa i para escribir, : para comandos."
  soft_wrap: false
  show_line_numbers: true

  # Modo Vim al arrancar. Valores aceptados: "insert", "normal".
  # Por defecto: "normal"
  vim_start_mode: "normal"

  # Tema de color. Cualquiera de los 21 temas integrados de Textual.
  # Ejemplos: textual-dark, tokyo-night, nord, dracula, gruvbox-dark,
  #           textual-light, catppuccin-mocha, monokai.
  # Por defecto: "textual-dark"
  theme: "textual-dark"


# -----------------------------------------------------------------------------
# Almacenamiento
# -----------------------------------------------------------------------------
storage:
  # Directorio que contiene todos los documentos JSON del proyecto.
  # Por defecto: "files"
  vault_path: "files"

  # Documento que se abre al arrancar. Relative a vault_path.
  # Por defecto: "files/document.json"
  document_path: "files/document.json"

  # Si true, guarda en cada cambio de texto.
  # Por defecto: true
  auto_save: true


# -----------------------------------------------------------------------------
# Paneles
# -----------------------------------------------------------------------------
panels:
  files:
    # Si true, el panel de archivos es visible al arrancar.
    # Si false, oculto hasta pulsar Ctrl+B o :pane-files-toggle.
    # Por defecto: true
    visible_on_start: true


# -----------------------------------------------------------------------------
# Comandos
# -----------------------------------------------------------------------------
commands:
  theme-toggle:
    enabled: true
    description: "Toggle between dark and light theme."
    hotkeys: []

  theme-pick:
    enabled: true
    description: "Open the theme picker."
    hotkeys: []

  doc-rename:
    enabled: true
    description: "Rename the current JSON document."
    hotkeys: []

  doc-save:
    enabled: true
    description: "Force-save the document now."
    hotkeys:
      - "ctrl+s"

  pane-files-toggle:
    enabled: true
    description: "Toggle the file panel."
    hotkeys:
      - "space+b"

  pane-focus-files:
    enabled: true
    description: "Focus the file panel."
    hotkeys:
      - "space+h"

  pane-focus-editor:
    enabled: true
    description: "Focus the editor."
    hotkeys:
      - "space+l"

  pane-focus-up:
    enabled: true
    description: "Focus the panel above."
    hotkeys:
      - "space+k"

  pane-focus-down:
    enabled: true
    description: "Focus the panel below."
    hotkeys:
      - "space+j"

  doc-new:
    enabled: true
    description: "Create a new JSON document."
    hotkeys: []

  doc-open:
    enabled: true
    description: "Open a document from the vault."
    hotkeys: []

  command-palette:
    enabled: true
    description: "Open the command palette."
    hotkeys:
      - "space+p"

  doc-delete:
    enabled: true
    description: "Delete the current document."
    hotkeys: []